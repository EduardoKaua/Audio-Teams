<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enviar Áudio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card">
    <img src="assets/logo-fator.png" alt="Fator Contabilidade" class="logo" />
    <h1>Gravar áudio</h1>
    <p id="status" class="status">Pronto para gravar</p>

    <div class="timer" id="timer">00:00</div>

    <div class="controls">
      <button id="recordBtn" class="btn btn-record">Gravar</button>
      <button id="stopBtn" class="btn btn-stop" disabled>Parar</button>
    </div>

    <audio id="preview" controls class="preview hidden"></audio>

    <div class="controls">
      <button id="shareBtn" class="btn btn-primary hidden">Compartilhar</button>
      <button id="downloadBtn" class="btn btn-secondary hidden">Baixar áudio</button>
      <button id="resetBtn" class="btn btn-reset hidden">Nova gravação</button>
    </div>

    <p id="hint" class="hint hidden">
      Clique em "Baixar áudio" acima e depois anexe o arquivo no chat do Teams pelo ícone de clipe 📎.
    </p>
  </main>

  <script src="app.js"></script>
</body>
</html>
